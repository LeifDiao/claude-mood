<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="dark">
<title>Claude Crew · 小 Claude 打工天团</title>
<style>
  /* ===================== 暖光指挥所 · warm-glow control room ===================== */
  :root{
    /* page / surface */
    --bg:#15140F;
    --dot:#2A2820;
    --card-base:#1F1D17;
    --card-top:#262318;
    --border:#322E22;
    --hairline:#3D3829;
    /* text */
    --ink:#F4ECD8;        /* warm bone white */
    --ink2:#9A9279;       /* warm taupe-gray */
    --muted:#5C5746;
    /* brand */
    --claude:#D97757;     /* clay/rust orange */
    /* per-mood accents */
    --hot:#FF5C49;       --hot-glow:rgba(255,92,73,.38);
    --excited:#FFC24B;   --excited-glow:rgba(255,194,75,.34);
    --doze:#6FA8C7;      --doze-glow:rgba(111,168,199,.22);
    --online:#5FD0A6;    --online-glow:rgba(95,208,166,.28);
    --stuck:#B98BE0;     --stuck-glow:rgba(185,139,224,.26);
    --waiting:#5B9DFF;   --waiting-glow:rgba(91,157,255,.32);
    --permission:#EE7CA6;--permission-glow:rgba(238,124,166,.32);
    --fleet:#9B7BF0;     --fleet-glow:rgba(155,123,240,.30);
    --fresh:#9BE34B;     --fresh-glow:rgba(155,227,75,.28);
    --full:#FF8A3D;      --full-glow:rgba(255,138,61,.34);

    --ui:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Source Han Sans SC","Noto Sans CJK SC",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"SF Mono","JetBrains Mono",ui-monospace,"Menlo","Cascadia Mono","DejaVu Sans Mono",Consolas,monospace;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    background-image:radial-gradient(var(--dot) 1px, transparent 1.4px);
    background-size:14px 14px;
    background-position:-1px -1px;
    color:var(--ink);
    font-family:var(--ui);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    min-height:100vh;
  }
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums}
  .wrap{position:relative;max-width:1216px;margin:0 auto;padding:40px 28px 64px}

  /* ===================== LANGUAGE TOGGLE ===================== */
  .langtoggle{
    position:absolute;top:40px;right:28px;z-index:30;
    display:inline-flex;gap:2px;padding:3px;border-radius:999px;
    background:linear-gradient(180deg, var(--card-top), var(--card-base));
    border:1px solid var(--border);
    box-shadow:0 3px 10px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .langtoggle button{
    font-family:var(--ui);font-size:12px;font-weight:700;letter-spacing:.02em;
    color:var(--ink2);background:transparent;border:0;border-radius:999px;
    padding:4px 11px;cursor:pointer;line-height:1.2;
    transition:color .25s ease, background .25s ease, box-shadow .25s ease;
  }
  .langtoggle button:not(.on):hover{color:var(--ink)}
  .langtoggle button.on{
    color:var(--bg);background:var(--claude);
    box-shadow:0 0 12px rgba(217,119,87,.4);
  }
  @media (max-width:600px){ .langtoggle{top:24px;right:16px} }

  /* ===================== HEADER ===================== */
  header.hd{
    display:flex;align-items:flex-end;justify-content:space-between;
    gap:28px;flex-wrap:wrap;margin-bottom:22px;
  }
  .hd-left{display:flex;flex-direction:column;gap:7px;min-width:260px}
  .kicker{
    display:inline-flex;align-items:center;gap:8px;align-self:flex-start;
    font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--ink2);
    text-transform:uppercase;margin-bottom:2px;
  }
  .kicker .badge{
    font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.04em;
    color:var(--claude);background:color-mix(in srgb, var(--claude) 14%, transparent);
    border:1px solid color-mix(in srgb, var(--claude) 32%, transparent);
    padding:2px 7px;border-radius:999px;text-transform:none;
  }
  .count-row{display:flex;align-items:baseline;gap:16px}
  .live-dot{
    width:11px;height:11px;border-radius:50%;align-self:center;
    background:var(--online);box-shadow:0 0 14px var(--online-glow), 0 0 0 5px rgba(95,208,166,.07);
    animation:livepulse 2s ease-in-out infinite;flex:none;margin-bottom:6px;
  }
  @keyframes livepulse{0%,100%{transform:scale(1);opacity:.55}50%{transform:scale(1.3);opacity:1}}
  .bigcount{
    font-family:var(--mono);font-variant-numeric:tabular-nums;
    font-size:72px;font-weight:700;line-height:.85;letter-spacing:-.03em;
    background:linear-gradient(180deg, var(--ink) 30%, #C9A78A 130%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  .count-suffix{font-size:17px;font-weight:600;color:var(--ink2);letter-spacing:.01em;
    align-self:flex-end;margin-bottom:9px;white-space:nowrap}
  .count-suffix b{color:var(--ink);font-weight:700}
  .count-line{font-size:18px;font-weight:600;color:var(--ink);letter-spacing:.01em;margin-top:2px}
  .count-line .n{color:var(--claude);font-family:var(--mono);font-weight:700}
  .subtitle{font-size:13px;font-weight:500;color:var(--ink2);line-height:1.55;margin-top:1px}
  .subtitle .z{color:var(--muted)}
  .subtitle .punch{color:var(--accent-now,var(--claude));font-weight:600}

  /* mood tally */
  .tally{display:flex;align-items:flex-end;gap:9px;flex-wrap:wrap;justify-content:flex-end}
  .tally-cap{flex-basis:100%;text-align:right;font-size:10px;font-weight:700;
    letter-spacing:.16em;color:var(--muted);margin-bottom:1px}
  .chip{
    position:relative;
    display:inline-flex;align-items:center;gap:8px;
    padding:8px 13px;border-radius:13px;
    background:linear-gradient(180deg, var(--card-top), var(--card-base));
    border:1px solid var(--border);
    box-shadow:0 3px 10px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05);
    font-size:13px;font-weight:600;line-height:1;
    transition:opacity .4s ease, filter .4s ease, border-color .4s ease, transform .2s ease, box-shadow .4s ease;
  }
  .chip:hover{transform:translateY(-1px)}
  .chip .em{font-size:16px;filter:saturate(1.15)}
  .chip .cl{color:var(--ink2);font-weight:600;font-size:12.5px}
  .chip:not(.zero) .cl{color:var(--ink)}
  .chip .cn{font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--ink);font-weight:700;font-size:14px;
    min-width:9px;text-align:center}
  @media (max-width:760px){ .chip .cl{display:none} }
  .chip.zero{opacity:.32;filter:grayscale(.9) brightness(.82);box-shadow:none}
  .chip:not(.zero){box-shadow:0 3px 12px rgba(0,0,0,.42), inset 0 1px 0 rgba(255,255,255,.05), 0 0 0 1px var(--chip-edge,transparent)}
  .chip[data-m="hot"]{--chip-edge:rgba(255,92,73,.45);border-color:rgba(255,92,73,.4)}
  .chip[data-m="excited"]{--chip-edge:rgba(255,194,75,.45);border-color:rgba(255,194,75,.4)}
  .chip[data-m="doze"]{--chip-edge:rgba(111,168,199,.42);border-color:rgba(111,168,199,.4)}
  .chip[data-m="online"]{--chip-edge:rgba(95,208,166,.45);border-color:rgba(95,208,166,.4)}
  .chip[data-m="stuck"]{--chip-edge:rgba(185,139,224,.45);border-color:rgba(185,139,224,.4)}

  .divider{height:1px;background:linear-gradient(90deg,transparent,var(--border) 12%,var(--border) 88%,transparent);margin:20px 0 24px;border:0}

  /* ===================== GRID ===================== */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(330px, 1fr));
    gap:22px;
  }
  @media (min-width:1024px){
    .grid{grid-template-columns:repeat(auto-fill, minmax(360px, 1fr))}
  }

  /* ===================== CARD ===================== */
  .card{
    position:relative;
    background:
      radial-gradient(120% 80% at 0% 0%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 60%),
      linear-gradient(180deg, var(--card-top) 0%, var(--card-base) 64%);
    border:1px solid var(--border);
    border-radius:18px;
    padding:18px 20px 15px 23px;
    box-shadow:0 10px 26px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.05);
    overflow:hidden;
    transition:transform .2s cubic-bezier(.2,.8,.2,1), box-shadow .2s ease;
    --accent:var(--online);
    --glow:var(--online-glow);
    animation:cardin .42s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes cardin{from{opacity:0;transform:translateY(10px) scale(.99)}to{opacity:1;transform:none}}
  .card:hover{transform:translateY(-4px);box-shadow:0 18px 40px rgba(0,0,0,.62), inset 0 1px 0 rgba(255,255,255,.07), 0 0 22px var(--glow)}
  /* accent spine */
  .card::before{
    content:"";position:absolute;left:0;top:0;bottom:0;width:3px;
    background:linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 55%, transparent));
    box-shadow:0 0 16px var(--glow);
    transition:background .6s ease, box-shadow .6s ease;
  }
  /* inner hairline glow tint at top */
  .card::after{
    content:"";position:absolute;inset:0;pointer-events:none;border-radius:18px;
    box-shadow:inset 0 0 0 1px var(--hairline);opacity:.5;
  }
  .card.activenow{
    box-shadow:0 10px 26px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06), 0 0 0 1px var(--accent);
  }
  .activedot{
    position:absolute;top:13px;right:13px;
    display:inline-flex;align-items:center;gap:5px;
    padding:3px 8px 3px 6px;border-radius:999px;
    background:color-mix(in srgb, var(--accent) 14%, transparent);
    border:1px solid color-mix(in srgb, var(--accent) 34%, transparent);
    font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.1em;color:var(--accent);
  }
  .activedot::before{
    content:"";width:6px;height:6px;border-radius:50%;
    background:var(--accent);box-shadow:0 0 8px var(--glow);
    animation:livepulse 2s ease-in-out infinite;flex:none;
  }

  /* card top row: creature + mood label */
  .ctop{display:flex;align-items:flex-start;gap:15px;margin-bottom:13px}

  /* mood color binding per card */
  .card[data-mood="hot"]{--accent:var(--hot);--glow:var(--hot-glow)}
  .card[data-mood="excited"]{--accent:var(--excited);--glow:var(--excited-glow)}
  .card[data-mood="doze"]{--accent:var(--doze);--glow:var(--doze-glow)}
  .card[data-mood="online"]{--accent:var(--online);--glow:var(--online-glow)}
  .card[data-mood="stuck"]{--accent:var(--stuck);--glow:var(--stuck-glow)}
  .card[data-mood="waiting"]{--accent:var(--waiting);--glow:var(--waiting-glow)}
  .card[data-mood="permission"]{--accent:var(--permission);--glow:var(--permission-glow)}
  .card[data-mood="fleet"]{--accent:var(--fleet);--glow:var(--fleet-glow)}
  .card[data-mood="fresh"]{--accent:var(--fresh);--glow:var(--fresh-glow)}
  .card[data-mood="full"]{--accent:var(--full);--glow:var(--full-glow)}

  /* ===== 每个新状态的专属表情（不再共用基础脸）===== */
  /* 🙋 在等你：盯着你、亮眼、小圆嘴（期待） */
  .m-waiting .claude{animation:bob 2.6s ease-in-out infinite}
  .m-waiting .eye{width:8px;height:8px;border-radius:50%;top:14px}
  .m-waiting .eye::after{content:"";position:absolute;top:1px;right:1px;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.9}
  .m-waiting .mouth{width:5px;height:5px;border:0;border-radius:50%;background:#2A1C14;bottom:9px}
  .m-waiting .blush{opacity:.45}

  /* 🔐 等你批权限：一只眼挑高、平嘴疑惑、头顶问号 */
  .m-permission .claude{animation:ponder 5s ease-in-out infinite;transform-origin:50% 75%}
  .m-permission .eye{width:7px;height:7px;border-radius:50%;top:15px}
  .m-permission .eye.r{top:12px}
  .m-permission .mouth{width:6px;height:2px;border:0;border-radius:2px;background:#2A1C14;bottom:10px}
  .m-permission .blush{opacity:.4}
  .m-permission .qmark{position:absolute;top:-1px;right:9px;font-family:var(--mono);font-weight:800;font-size:13px;
    color:var(--permission);text-shadow:0 0 7px var(--permission-glow);animation:bob 1.8s ease-in-out infinite}

  /* 🐝 在带队：专注微眯眼、自信小笑、N 只小弟绕圈 */
  /* 🐝 在带队：boss 戴帽子、正嘬一口饮料；下方 3 个小小太阳从左到右循环小跑（subagent 小分队） */
  .m-fleet .claude{animation:bob 2.6s ease-in-out infinite}
  .m-fleet .eye{width:6px;height:6px;border-radius:50%;top:14px}
  /* 抿吸的小圆口（吸管插进来），一嘬一嘬 */
  .m-fleet .mouth{width:5px;height:5px;border:0;border-radius:50%;background:#2A1C14;bottom:9px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.18);animation:sip 1.7s ease-in-out infinite}
  /* 嘬一口时鼓起的左腮（右脸被杯子挡住，放左脸才看得见）——幅度加大、更明显 */
  .m-fleet .blush{opacity:0}
  .m-fleet .blush.l{left:4px;top:24px;width:9px;height:7px;opacity:.82;transform-origin:60% 50%;
    background:radial-gradient(circle,rgba(255,128,92,1),rgba(255,140,105,.5) 48%,transparent 66%);animation:cheek 1.7s ease-in-out infinite}
  /* 小帽子 */
  .m-fleet .hat{position:absolute;left:50%;top:-12px;transform:translateX(-50%) rotate(-9deg);width:30px;height:14px;z-index:5}
  .m-fleet .hat .brim{position:absolute;bottom:0;left:0;width:30px;height:5px;border-radius:50%;background:#3a2a1e;box-shadow:0 1px 1px rgba(0,0,0,.45)}
  .m-fleet .hat .crown{position:absolute;bottom:3px;left:6px;width:18px;height:11px;border-radius:9px 9px 3px 3px;background:linear-gradient(180deg,#5a4030,#36261a);box-shadow:inset 0 1px 0 rgba(255,255,255,.14)}
  .m-fleet .hat .band{position:absolute;bottom:3px;left:6px;width:18px;height:3.5px;background:var(--fleet);opacity:.92}
  /* 饮料杯 + 吸管：吸管一直送到嘴边，正在喝 */
  .m-fleet .drink{position:absolute;right:-5px;bottom:1px;width:13px;height:16px;z-index:5}
  .m-fleet .drink .cup{position:absolute;bottom:0;left:1px;width:11px;height:13px;border-radius:2px 2px 4px 4px;overflow:hidden;
    background:linear-gradient(180deg, rgba(255,255,255,.22) 0 30%, #F4A04C 30%);border:1px solid rgba(255,255,255,.4);box-shadow:0 1px 2px rgba(0,0,0,.4)}
  /* 弯吸管：斜段（嘴→杯口）+ 竖段（插进奶茶里），在杯口相接 */
  .m-fleet .drink .straw{position:absolute;top:-17px;left:5px;width:2.6px;height:19px;border-radius:2px;background:#EE7CA6;transform:rotate(-100deg);transform-origin:bottom}
  .m-fleet .drink::after{content:"";position:absolute;left:5px;top:1px;width:2.6px;height:10px;border-radius:2px;background:#EE7CA6}
  .m-fleet .mini{position:absolute;left:3px;top:48px;width:10px;height:10px;border-radius:3px;background:var(--claude);
    box-shadow:0 0 5px var(--fleet-glow);animation:march 2.4s linear infinite}
  .m-fleet .mini::before{content:"";position:absolute;inset:0;border-radius:3px;background:var(--claude);transform:rotate(45deg)}
  .m-fleet .mini::after{content:"";position:absolute;inset:2px;border-radius:50%;
    background:radial-gradient(circle at 36% 30%, rgba(255,255,255,.6), transparent 60%), var(--claude)}
  @keyframes march{0%{transform:translate(0,0);opacity:0}10%{opacity:1}25%{transform:translate(12px,-3px)}50%{transform:translate(24px,0)}75%{transform:translate(36px,-3px)}90%{opacity:1}100%{transform:translate(48px,0);opacity:0}}
  @keyframes sip{0%,42%,100%{transform:translateX(-50%) scale(1)}66%{transform:translateX(-50%) scale(.62)}}
  @keyframes cheek{0%,42%,100%{transform:translateX(0) scale(1)}66%{transform:translateX(-1px) scale(1.28)}}

  /* 🆕 刚开工：水汪汪大眼、咧嘴大笑、嫩绿腮红，蹦跶 */
  .m-fresh .claude{animation:hop 1.5s ease-in-out infinite}
  .m-fresh .eye{width:8px;height:9px;border-radius:50%;top:13px}
  .m-fresh .eye::after{content:"";position:absolute;top:1.5px;right:1.5px;width:3.5px;height:3.5px;border-radius:50%;background:#fff}
  .m-fresh .mouth{width:12px;height:7px;border:0;border-radius:0 0 12px 12px;background:#2A1C14;bottom:7px}
  .m-fresh .blush{opacity:.7;background:radial-gradient(circle, rgba(155,227,75,.6), transparent 72%)}

  /* 🫗 快满了：瞪大空心眼、咧嘴苦相、涨红脸，轻微晃 */
  .m-full .claude{animation:shake 3s ease-in-out infinite}
  .m-full .eye{width:8px;height:8px;border-radius:50%;background:transparent;border:2px solid #2A1C14;top:14px}
  .m-full .mouth{width:11px;height:4px;border:0;border-radius:3px;background:#2A1C14;bottom:10px;transform:skewX(-7deg)}
  .m-full .blush{opacity:.9;width:7px;height:5px;background:radial-gradient(circle, rgba(255,138,61,.8), transparent 72%)}

  /* ----- creature stage ----- */
  .stage{position:relative;width:64px;height:64px;flex:none}
  .glow{
    position:absolute;left:50%;top:50%;width:92px;height:92px;
    transform:translate(-50%,-50%);border-radius:50%;
    background:radial-gradient(circle, var(--glow) 0%, transparent 66%);
    transition:background .6s ease;
  }
  /* soft seat shadow grounding the creature */
  .stage::after{
    content:"";position:absolute;left:50%;bottom:1px;width:38px;height:8px;
    transform:translateX(-50%);border-radius:50%;
    background:radial-gradient(ellipse, rgba(0,0,0,.45), transparent 70%);
    opacity:.7;pointer-events:none;
  }
  /* the little Claude — starburst desk creature */
  .claude{
    position:absolute;left:4px;top:4px;width:56px;height:56px;
    transform-origin:50% 62%;
  }
  /* 8-point burst silhouette via two crossed bars behind core */
  .burst, .burst2{
    position:absolute;left:50%;top:50%;width:54px;height:15px;border-radius:8px;
    background:var(--claude);
    transform:translate(-50%,-50%) rotate(0deg);
  }
  .burst2{transform:translate(-50%,-50%) rotate(45deg)}
  .burst::after, .burst2::after{content:"";position:absolute;inset:0;border-radius:8px;
    background:linear-gradient(135deg, rgba(255,255,255,.26), transparent 52%)}
  .vbar, .vbar2{
    position:absolute;left:50%;top:50%;width:15px;height:54px;border-radius:8px;
    background:var(--claude);transform:translate(-50%,-50%) rotate(0deg);
  }
  .vbar2{transform:translate(-50%,-50%) rotate(45deg)}
  /* plush core */
  .core{
    position:absolute;left:50%;top:50%;width:41px;height:41px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:
      radial-gradient(circle at 32% 26%, rgba(255,255,255,.36), transparent 44%),
      radial-gradient(circle at 72% 80%, rgba(0,0,0,.24), transparent 52%),
      var(--claude);
    box-shadow:inset 0 -2px 5px rgba(0,0,0,.26), inset 0 2px 3px rgba(255,255,255,.18), 0 1px 2px rgba(0,0,0,.42);
    z-index:2;
  }
  /* face */
  .face{position:absolute;left:50%;top:50%;width:41px;height:41px;transform:translate(-50%,-50%);z-index:3}
  .eye{position:absolute;width:6px;height:8px;border-radius:50%;background:#2A1C14;top:15px;
    box-shadow:inset 1px 1px 0 rgba(255,255,255,.35)}
  .eye.l{left:11px}.eye.r{right:11px}
  /* cheek blush — appears per-mood */
  .blush{position:absolute;width:6px;height:4px;border-radius:50%;top:22px;opacity:0;
    background:radial-gradient(circle, rgba(255,150,120,.7), transparent 72%)}
  .blush.l{left:7px}.blush.r{right:7px}
  .mouth{position:absolute;left:50%;bottom:9px;transform:translateX(-50%);
    width:10px;height:5px;border:1.6px solid #2A1C14;border-top:0;border-radius:0 0 10px 10px}
  /* accessories layer */
  .acc{position:absolute;left:50%;top:50%;width:56px;height:56px;transform:translate(-50%,-50%);z-index:4;pointer-events:none}

  /* ===== ONLINE 😎 sunglasses + calm bob ===== */
  .m-online .claude{animation:bob 3.2s ease-in-out infinite}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
  .m-online .eye{height:3px;border-radius:3px;top:18px}
  .m-online .shades{position:absolute;left:50%;top:16px;transform:translateX(-50%);
    width:27px;height:9px;background:linear-gradient(180deg,#23201A,#0F0E0A);
    border-radius:5px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.12)}
  .m-online .shades::after{content:"";position:absolute;left:50%;top:50%;transform:translateX(-50%);
    width:3px;height:2px;background:rgba(255,255,255,.15);border-radius:2px}
  .m-online .shades::before{content:"";position:absolute;top:0;left:-40%;width:34%;height:100%;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent);
    animation:sheen 4.5s ease-in-out infinite}
  @keyframes sheen{0%,72%{left:-40%}100%,88%{left:120%}}
  .m-online .mouth{width:12px;height:2px;border:0;border-radius:2px;background:#2A1C14;bottom:9px;
    box-shadow:0 -2px 0 -1px rgba(42,28,20,.0)}

  /* ===== HOT 🥵 steam + shake + sweat ===== */
  .m-hot .claude{animation:shake 2.4s ease-in-out infinite}
  @keyframes shake{0%,72%,100%{transform:rotate(0)}74%{transform:rotate(-1.5deg)}77%{transform:rotate(1.5deg)}80%{transform:rotate(-1.5deg)}83%{transform:rotate(1.5deg)}86%{transform:rotate(0)}}
  .m-hot .core{background:
      radial-gradient(circle at 32% 26%, rgba(255,255,255,.32), transparent 44%),
      radial-gradient(circle at 50% 95%, rgba(255,80,60,.5), transparent 55%),
      var(--claude)}
  .m-hot .eye{width:7px;height:2px;border-radius:2px;transform:rotate(0);top:18px}
  .m-hot .eye.l{transform:rotate(18deg)}.m-hot .eye.r{transform:rotate(-18deg)}
  .m-hot .blush{opacity:.9;width:7px;height:5px;background:radial-gradient(circle, rgba(255,90,70,.8), transparent 72%)}
  .m-hot .mouth{border-radius:10px 10px 0 0;border-top:1.6px solid #2A1C14;border-bottom:0;height:4px;bottom:11px}
  .m-hot .steam{position:absolute;top:-2px;width:5px;height:10px;border-radius:50%;
    background:rgba(255,180,170,.55);filter:blur(.4px);opacity:0}
  .m-hot .steam.s1{left:14px;animation:steam 1.6s ease-out infinite}
  .m-hot .steam.s2{right:14px;animation:steam 1.6s ease-out .8s infinite}
  @keyframes steam{0%{transform:translateY(0) scale(.7);opacity:0}25%{opacity:.7}100%{transform:translateY(-14px) scale(1.1);opacity:0;filter:blur(2px)}}
  .m-hot .sweat{position:absolute;top:14px;right:9px;width:4px;height:6px;
    background:rgba(150,210,255,.85);border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
    box-shadow:0 0 3px rgba(150,210,255,.5);animation:sweat 2.6s ease-in infinite;opacity:0}
  @keyframes sweat{0%,55%{transform:translateY(0);opacity:0}60%{opacity:.9}88%{transform:translateY(13px);opacity:.9}100%{transform:translateY(16px);opacity:0}}
  .m-hot .glow{animation:hotpulse 2.4s ease-in-out infinite}
  @keyframes hotpulse{0%,72%,100%{opacity:1}78%{opacity:.6}82%{opacity:1}}

  /* ===== EXCITED 🎉 hop + confetti ===== */
  .m-excited .claude{animation:hop .9s ease-in-out infinite}
  @keyframes hop{0%,100%{transform:translateY(0) scaleY(1)}40%{transform:translateY(-7px) scaleY(1.03)}55%{transform:translateY(-7px)}80%{transform:translateY(0) scaleY(.9)}90%{transform:translateY(0) scaleY(1)}}
  .m-excited .eye{width:7px;height:7px;background:transparent;border-radius:0;top:14px}
  .m-excited .eye::before{content:"✦";position:absolute;left:-3px;top:-7px;font-size:12px;color:#2A1C14;line-height:1}
  .m-excited .blush{opacity:.85}
  .m-excited .mouth{width:12px;height:7px;border:0;border-radius:0 0 12px 12px;background:#2A1C14;bottom:7px}
  .m-excited .conf{position:absolute;top:5px;width:5px;height:5px;border-radius:1px;opacity:0}
  .m-excited .conf.c1{left:13px;background:var(--excited);animation:conf 1.7s ease-out infinite}
  .m-excited .conf.c2{left:24px;background:var(--hot);border-radius:50%;animation:conf 1.7s ease-out .3s infinite}
  .m-excited .conf.c3{left:36px;background:var(--online);animation:conf 1.7s ease-out .6s infinite}
  .m-excited .conf.c4{left:46px;background:var(--stuck);border-radius:50%;animation:conf 1.7s ease-out .95s infinite}
  @keyframes conf{0%{transform:translateY(-10px) rotate(0);opacity:0}15%{opacity:1}100%{transform:translateY(28px) rotate(220deg);opacity:0}}
  .m-excited .glow{animation:expulse 1.8s ease-in-out infinite}
  @keyframes expulse{0%,100%{opacity:.85}50%{opacity:1}}

  /* ===== DOZE 😴 Zzz + breathe + dim ===== */
  .card[data-mood="doze"] .stage{opacity:.74;filter:saturate(.68)}
  .m-doze .claude{animation:breathe 4.5s ease-in-out infinite;transform-origin:50% 80%}
  @keyframes breathe{0%,100%{transform:scale(1) rotate(0)}50%{transform:scale(1.035) rotate(1.5deg)}}
  .m-doze .eye{width:9px;height:2px;border-radius:2px;background:transparent;top:18px;
    border-bottom:2px solid #2A1C14;height:5px;border-radius:0 0 9px 9px}
  .m-doze .blush{opacity:.5;background:radial-gradient(circle, rgba(120,160,200,.6), transparent 72%)}
  .m-doze .mouth{width:6px;height:2px;border:0;border-radius:2px;background:#2A1C14;bottom:11px}
  .m-doze .z{position:absolute;font-family:var(--mono);font-weight:700;color:var(--doze);right:4px;top:6px;opacity:0;
    text-shadow:0 0 6px var(--doze-glow)}
  .m-doze .z.z1{font-size:10px;animation:zzz 3.6s ease-out infinite}
  .m-doze .z.z2{font-size:13px;right:-2px;animation:zzz 3.6s ease-out .6s infinite}
  .m-doze .z.z3{font-size:16px;right:-8px;animation:zzz 3.6s ease-out 1.2s infinite}
  @keyframes zzz{0%{transform:translateY(0) scale(.6);opacity:0}20%{opacity:.9}100%{transform:translateY(-18px) scale(1);opacity:0}}

  /* ===== STUCK 🤔 orbiting ? + thinking tilt ===== */
  .m-stuck .claude{animation:ponder 5s ease-in-out infinite;transform-origin:50% 75%}
  @keyframes ponder{0%,100%{transform:rotate(7deg)}50%{transform:rotate(-4deg)}}
  .m-stuck .eye{top:13px;width:5px;height:6px}
  .m-stuck .eye.l{left:13px}.m-stuck .eye.r{right:13px}
  .m-stuck .blush{opacity:.4;background:radial-gradient(circle, rgba(170,130,210,.55), transparent 72%)}
  .m-stuck .mouth{width:8px;height:3px;border:0;border-radius:3px;background:#2A1C14;bottom:11px;left:42%}
  .m-stuck .orbit{position:absolute;inset:0;animation:spin 4.5s linear infinite}
  .m-stuck .q{position:absolute;top:-5px;left:50%;transform:translateX(-50%);
    font-family:var(--mono);font-weight:700;font-size:16px;color:var(--stuck);
    text-shadow:0 0 8px var(--stuck-glow)}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .m-stuck .glow{animation:flicker 6s ease-in-out infinite}
  @keyframes flicker{0%,88%,100%{opacity:1}92%{opacity:.5}96%{opacity:1}}

  /* ----- mood label block (top right) ----- */
  .moodbox{margin-left:auto;text-align:right;padding-top:3px}
  .card.activenow .moodbox{padding-top:24px}
  .minilabel{font-size:9.5px;font-weight:700;letter-spacing:.18em;color:var(--muted);display:block}
  .card.activenow .minilabel{display:none}
  .moodlabel{font-size:14.5px;font-weight:650;color:var(--accent);margin-top:4px;display:inline-block;
    text-shadow:0 0 14px var(--glow)}
  .moodlabel .em{margin-right:5px}
  .moodtick{height:2px;width:30px;background:linear-gradient(90deg,transparent,var(--accent));
    margin-left:auto;margin-top:6px;opacity:.85;border-radius:1px}

  /* ----- title + repo ----- */
  .titlerow{margin-bottom:5px}
  .ctitle{font-size:16.5px;font-weight:650;color:var(--ink);letter-spacing:-.005em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.32}
  .repo{font-family:var(--mono);font-size:11.5px;color:var(--ink2);letter-spacing:.01em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:3px;
    display:flex;align-items:center;gap:5px}
  .repo::before{content:"▸";color:var(--accent);font-size:9px;opacity:.85;flex:none}

  /* ----- mood reason ----- */
  .reason{position:relative;font-size:12.5px;font-weight:450;color:var(--ink2);line-height:1.55;
    margin:10px 0 13px;padding-left:11px;min-height:18px}
  .reason::before{content:"";position:absolute;left:0;top:3px;bottom:3px;width:2px;border-radius:2px;
    background:color-mix(in srgb, var(--accent) 55%, transparent)}

  /* ----- meta strip ----- */
  .metarule{height:1px;background:var(--hairline);opacity:.5;margin:0 -20px 12px -23px}
  .meta{display:flex;align-items:center;gap:9px;flex-wrap:wrap;
    font-family:var(--mono);font-size:11.5px;font-weight:500;letter-spacing:.02em;color:var(--muted)}
  .meta .seg{display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
  .meta .gl{color:var(--ink2);opacity:.85}
  .meta .v{color:var(--ink2)}
  .meta .dot-sep{color:var(--muted);opacity:.5}
  .model{display:inline-flex;align-items:center;margin-left:auto;
    background:color-mix(in srgb, var(--accent) 13%, transparent);
    color:var(--accent);border:1px solid color-mix(in srgb, var(--accent) 30%, transparent);
    border-radius:6px;padding:2px 7px;font-size:10.5px;font-weight:600;letter-spacing:.02em}
  /* 上下文变体小标，比如 1M —— 醒目金色，一眼看出谁开了大窗口 */
  .mtag{margin-left:5px;padding:0 4px;border-radius:4px;font-size:8.5px;font-weight:800;
    letter-spacing:.03em;line-height:1.5;
    background:rgba(240,182,80,.18);color:#f0b860;border:1px solid rgba(240,182,80,.42)}

  /* context meter — segmented mono meter */
  .ctxrow{display:flex;align-items:center;gap:9px;margin-top:11px}
  .ctxlbl{font-size:9.5px;font-weight:700;letter-spacing:.12em;color:var(--muted);flex:none}
  .srcdot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-left:4px;vertical-align:middle}
  .srcdot.real{background:#46d39a;box-shadow:0 0 5px rgba(70,211,154,.55)} /* 实测 */
  .srcdot.est{background:transparent;border:1px solid var(--muted);opacity:.55} /* 估算 */
  .bar{display:flex;gap:3px;flex:1;max-width:120px}
  .seg-b{height:7px;flex:1;border-radius:2px;background:rgba(255,255,255,.07);
    box-shadow:inset 0 1px 0 rgba(0,0,0,.25);transition:background .4s ease}
  .seg-b.on{background:var(--accent);box-shadow:0 0 7px var(--glow), inset 0 1px 0 rgba(255,255,255,.2)}
  .ctxnum{font-family:var(--mono);font-variant-numeric:tabular-nums;font-size:12px;font-weight:700;color:var(--ink);margin-left:1px}
  .ctxtok{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-left:auto}

  /* ===================== EMPTY STATE ===================== */
  .empty{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:70px 20px 80px;gap:22px;
  }
  .empty .stage{width:120px;height:120px;transform:scale(2)}
  .empty .claude{transform:none}
  .empty h2{font-size:19px;font-weight:600;color:var(--ink);margin:14px 0 0}
  .empty p{font-size:14px;color:var(--ink2);margin:0;line-height:1.6}
  .empty .big{font-size:48px}

  /* ===================== FOOTER ===================== */
  footer{text-align:center;margin-top:52px;font-size:12px;font-weight:450;color:var(--muted);line-height:1.7}
  footer .pills{display:inline-flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-bottom:9px}
  footer .pill{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.03em;color:var(--ink2);
    background:var(--card-base);border:1px solid var(--border);border-radius:999px;padding:4px 11px}
  footer .b{color:var(--ink2);font-weight:600}

  /* loading skeleton fade */
  .loading{opacity:.5;text-align:center;padding:60px;color:var(--ink2);font-size:14px}

  @media (max-width:600px){
    .wrap{padding:26px 16px 50px}
    .bigcount{font-size:58px}
    .count-suffix{font-size:15px;margin-bottom:6px}
    .tally{justify-content:flex-start}
    .tally-cap,.tally .tally-cap{text-align:left}
    header.hd{margin-bottom:18px}
  }

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important}
    .live-dot{animation:none}
  }
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-0.15em}
  .gl .ic{width:.92em;height:.92em;vertical-align:-0.13em}
</style>
</head>

    <div class="tally" id="tally" aria-label="心情统计">
      <span class="tally-cap" id="tallycap">此刻心情分布</span>
    </div>
  </header>
  <hr class="divider">
  <main id="main">
    <div class="loading" id="loading">正在围观你的小 Claude 们…</div>
  </main>
  <footer>
    <div class="pills" id="footpills">
      <span class="pill">零 token</span>
      <span class="pill">纯本地</span>
      <span class="pill">只读 ~/.claude</span>
      <span class="pill">零对外请求</span>
    </div>
    <div id="footcopy">不打扰它们干活 · 一个 token 都没花 — <span class="b">Claude Crew</span> · 小 Claude 打工天团</div>
  </footer>
</div>

<script>
(function(){
  "use strict";

  var MOODS = ["waiting","permission","fleet","fresh","doze","hot","stuck","full","excited","online"];
  function ic(id){return '<svg class="ic"><use href="#i-'+id+'"></use></svg>';}

  // ===================== i18n =====================
  // 所有人类可读文案集中在这里。后端只发结构化数据（mood key / 数字 / 毫秒），
  // 由前端按所选语言渲染。语言切换是纯前端、零网络请求。
  var STR = {
    zh: {
      docTitle:"Claude Crew · 小 Claude 打工天团",
      badge:"小 Claude 打工天团",
      tallyAria:"心情统计",
      tallyCap:"此刻心情分布",
      subtitleInit:"零 token 纯本地围观 · 只读 ~/.claude",
      subtitleTail:"零 token 纯本地围观",
      loading:"正在围观你的小 Claude 们…",
      pills:["零 token","纯本地","只读 ~/.claude","零对外请求"],
      footer:'不打扰它们干活 · 一个 token 都没花 — <span class="b">Claude Crew</span> · 小 Claude 打工天团',
      activeNow:"活跃中",
      activeNowTitle:"此刻活跃中",
      untitled:"(无标题)",
      suffix0:"只小 Claude<br>都下班了",
      suffixN:'只小 Claude<br>正在帮你<b>打工</b>',
      moodTitle:function(label,n){ return label+"："+n+" 只"; },
      emptyH2:"一个小 Claude 都没在跑，老板今天放假？",
      emptyP:function(d){ return "现在一只在打工的都没有，它们都下班了 "+d+"<br>开个 session 它们就上线了"; },
      loadErr:function(m){ return "读不到 /api/state（"+m+"）<br>确认本地服务在跑着"; },
      labels:{waiting:"在等你",permission:"等你批权限",fleet:"在带队",fresh:"刚开工",doze:"在发呆",hot:"有点红温",stuck:"陷进去了",full:"快满了",excited:"收尾了",online:"状态在线"},
      fleetLabel:function(n){ return "在带队 ×"+n; },
      reason:{
        errors:function(r){ return "近期 "+r.n+" 次报错"; },
        stuck:function(){ return "AI 说卡住/要重开"; },
        finished:function(){ return "刚说完成了"; },
        steady:function(){ return "状态平稳"; },
        fleet:function(r){ return r.n+" 个小弟在跑"; },
        waiting_dur:function(r){ return "等你 "+fmtDur(r.ms)+"了"; },
        waiting_just:function(){ return "说完了，等你回话"; },
        permission:function(r){ return "卡 "+fmtDur(r.ms)+"了，可能等你批权限"; },
        fresh:function(){ return "刚开工，热身中"; },
        doze:function(r){ return fmtDur(r.ms)+"没动静"; },
        full:function(r){ return "上下文 "+r.pct+"% 快满了"; }
      },
      ctxReal:function(w){ return "真实窗口 "+w+"（来自 statusline，实测）"; },
      ctxEst:function(w){ return "窗口按 "+w+" 估算（transcript 读不到真实窗口；装 statusline 增强即变实测）"; },
      quip:{
        none:function(){ return "一只在打工的都没有，难得清净 "+ic("doze"); },
        waiting:function(p){ return "有 "+p+" 个说完话在等你了，该你出手 "+ic("waiting"); },
        hot:function(p){ return "有 "+p+" 只快烧起来了，递杯冰水？"+ic("hot"); },
        stuck:function(p){ return "有 "+p+" 只卡住挠头，要不去瞅一眼 "+ic("stuck"); },
        fleet:function(p){ return "有 "+p+" 只在带队，一堆小弟在跑 "+ic("fleet"); },
        full:function(p){ return "有 "+p+" 只上下文快满了，留意下 "+ic("full"); },
        excited:function(p){ return "有 "+p+" 只马上收尾，撒花准备好 "+ic("excited"); },
        fresh:function(p){ return "有 "+p+" 只刚开工，热身中 "+ic("fresh"); },
        manyActive:function(p,n){ return p+" 只同时开工，这就是同时跑 "+n+" 个 Claude 的样子 "+ic("online"); },
        someActive:function(p){ return p+" 只刚刚还动过手，状态在线 "+ic("online"); },
        idle:function(){ return "都在摸鱼发呆，没一只动手的 "+ic("doze"); }
      }
    },
    en: {
      docTitle:"Claude Crew · your little Claudes at work",
      badge:"little Claude work crew",
      tallyAria:"mood tally",
      tallyCap:"mood spread right now",
      subtitleInit:"zero-token, all-local peek · reads ~/.claude",
      subtitleTail:"zero-token, all-local peek",
      loading:"peeking at your little Claudes…",
      pills:["zero token","all local","reads ~/.claude","no outbound calls"],
      footer:'never interrupts them · not a single token spent — <span class="b">Claude Crew</span> · little Claude work crew',
      activeNow:"active",
      activeNowTitle:"active right now",
      untitled:"(untitled)",
      suffix0:"little Claudes<br>all clocked out",
      suffixN:'little Claudes<br>on the <b>job</b> for you',
      moodTitle:function(label,n){ return label+": "+n; },
      emptyH2:"Not a single Claude running — boss off today?",
      emptyP:function(d){ return "Nobody's on the clock, they've all clocked out "+d+"<br>Start a session and they'll show up"; },
      loadErr:function(m){ return "Can't reach /api/state ("+m+")<br>Make sure the local server is running"; },
      labels:{waiting:"waiting on you",permission:"needs approval",fleet:"leading",fresh:"just started",doze:"dozing",hot:"overheating",stuck:"stuck",full:"almost full",excited:"wrapping up",online:"online & steady"},
      fleetLabel:function(n){ return "leading ×"+n; },
      reason:{
        errors:function(r){ return r.n+" recent error"+(r.n===1?"":"s"); },
        stuck:function(){ return "AI says it's stuck / restarting"; },
        finished:function(){ return "just said it's done"; },
        steady:function(){ return "cruising along"; },
        fleet:function(r){ return r.n+" minion"+(r.n===1?"":"s")+" running"; },
        waiting_dur:function(r){ return "waiting "+fmtDur(r.ms)+" on you"; },
        waiting_just:function(){ return "done talking, waiting on you"; },
        permission:function(r){ return "stalled "+fmtDur(r.ms)+", maybe needs approval"; },
        fresh:function(){ return "just started, warming up"; },
        doze:function(r){ return "quiet for "+fmtDur(r.ms); },
        full:function(r){ return "context "+r.pct+"% — almost full"; }
      },
      ctxReal:function(w){ return "Real window "+w+" (from statusline, measured)"; },
      ctxEst:function(w){ return "Window estimated at "+w+" (transcript can't reveal the real window; install the statusline add-on to measure it)"; },
      quip:{
        none:function(){ return "Nobody on the clock — rare peace and quiet "+ic("doze"); },
        waiting:function(p){ return p+" finished talking and are waiting on you — your move "+ic("waiting"); },
        hot:function(p){ return p+" about to overheat — hand over an ice water? "+ic("hot"); },
        stuck:function(p){ return p+" stuck scratching their heads — maybe take a look "+ic("stuck"); },
        fleet:function(p){ return p+" leading a crew, minions swarming "+ic("fleet"); },
        full:function(p){ return p+" almost out of context — keep an eye out "+ic("full"); },
        excited:function(p){ return p+" about to wrap up — ready the confetti "+ic("excited"); },
        fresh:function(p){ return p+" just clocked in, warming up "+ic("fresh"); },
        manyActive:function(p,n){ return p+" working at once — this is what "+n+" Claudes in parallel looks like "+ic("online"); },
        someActive:function(p){ return p+" were just busy — online & steady "+ic("online"); },
        idle:function(){ return "All idling, nobody lifting a finger "+ic("doze"); }
      }
    }
  };

  // 当前语言：localStorage 记住的优先，否则按浏览器语言（zh* -> 中文，其余 -> 英文）。
  var LANG = (function(){
    try{ var s = localStorage.getItem("crew-lang"); if(s==="zh"||s==="en") return s; }catch(e){}
    return (navigator.language||navigator.userLanguage||"").toLowerCase().indexOf("zh")===0 ? "zh" : "en";
  })();
  function T(){ return STR[LANG]; }

  // 相对时间 / 时长：后端发原始毫秒，这里按当前语言格式化。
  function fmtRel(ms){
    ms = Number(ms)||0;
    if(LANG==="zh"){
      if(ms<60000) return "刚刚";
      if(ms<3600000) return Math.floor(ms/60000)+" 分钟前";
      if(ms<86400000) return Math.floor(ms/3600000)+" 小时前";
      return Math.floor(ms/86400000)+" 天前";
    }
    if(ms<60000) return "just now";
    if(ms<3600000) return Math.floor(ms/60000)+"m ago";
    if(ms<86400000) return Math.floor(ms/3600000)+"h ago";
    return Math.floor(ms/86400000)+"d ago";
  }
  function fmtDur(ms){
    ms = Number(ms)||0;
    if(LANG==="zh"){
      if(ms<3600000) return Math.max(1,Math.floor(ms/60000))+" 分钟";
      if(ms<86400000) return Math.floor(ms/3600000)+" 小时";
      return Math.floor(ms/86400000)+" 天";
    }
    if(ms<3600000) return Math.max(1,Math.floor(ms/60000))+"m";
    if(ms<86400000) return Math.floor(ms/3600000)+"h";
    return Math.floor(ms/86400000)+"d";
  }
  // 心情标签（fleet 把人数顶到标签上）。
  function labelFor(mood, count){
    return mood==="fleet" ? T().fleetLabel(count||0) : (T().labels[mood] || mood);
  }
  // 结构化原因 -> 当前语言文案；兼容老式字符串与缺失。
  function reasonText(r){
    if(!r) return "";
    if(typeof r==="string") return r;
    var f = T().reason[r.key];
    return f ? f(r) : "";
  }

  // ---- safe text ----
  function esc(s){
    if(s===null||s===undefined) return "";
    return String(s).replace(/[&<>"']/g,function(c){
      return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];
    });
  }

  // ---- 数字缩写：>=1M -> "1M / 1.5M"，>=1k -> "220k / 129.7k"，否则原样 ----
  function fmtNum(n){
    n = Number(n) || 0;
    if(n >= 1000000) return (Math.round(n/100000)/10) + "M";
    if(n >= 1000) return (Math.round(n/100)/10) + "k";
    return String(n);
  }

  // ---- CTX 行的悬停说明：真实窗口 vs 估算窗口（按语言）----
  function ctxTitle(src, winK){
    return src === "real" ? T().ctxReal(winK) : T().ctxEst(winK);
  }

  // ---- 模型徽章内容：去掉 claude- 前缀，把 [1m] 这类变体拆成醒目小标 ----
  function modelInner(m){
    if(!m) return "";
    var name = String(m).replace(/^claude-/,"");
    var mt = name.match(/^(.*?)\[([^\]]+)\]$/); // 捕获 [1m] 等变体后缀
    if(mt) return esc(mt[1]) + '<b class="mtag">' + esc(mt[2].toUpperCase()) + '</b>';
    return esc(name);
  }

  // ---- build the pure-CSS little Claude for a given mood ----
  function creatureHTML(mood, count){
    var body =
      '<div class="glow"></div>'+
      '<div class="claude">'+
        '<div class="burst"></div><div class="burst2"></div>'+
        '<div class="vbar"></div><div class="vbar2"></div>'+
        '<div class="core"></div>'+
        '<div class="face">'+
          '<div class="eye l"></div><div class="eye r"></div>'+
          '<div class="blush l"></div><div class="blush r"></div>'+
          '<div class="mouth"></div>'+
          (mood==="online" ? '<div class="shades"></div>' : '')+
          (mood==="fleet" ? '<div class="hat"><span class="brim"></span><span class="crown"></span><span class="band"></span></div><div class="drink"><span class="cup"></span><span class="straw"></span></div>' : '')+
        '</div>';
    var acc = '';
    if(mood==="hot"){
      acc = '<div class="acc"><div class="steam s1"></div><div class="steam s2"></div><div class="sweat"></div></div>';
    } else if(mood==="excited"){
      acc = '<div class="acc"><div class="conf c1"></div><div class="conf c2"></div><div class="conf c3"></div><div class="conf c4"></div></div>';
    } else if(mood==="doze"){
      acc = '<div class="acc"><span class="z z1">z</span><span class="z z2">z</span><span class="z z3">Z</span></div>';
    } else if(mood==="stuck"){
      acc = '<div class="acc"><div class="orbit"><span class="q">?</span></div></div>';
    } else if(mood==="fleet"){
      // 固定 3 个小小太阳，从左到右循环小跑（错峰延时 = 连续跑马灯）
      acc = '<div class="acc">'
        + '<span class="mini" style="animation-delay:0s"></span>'
        + '<span class="mini" style="animation-delay:-.8s"></span>'
        + '<span class="mini" style="animation-delay:-1.6s"></span>'
        + '</div>';
    } else if(mood==="permission"){
      acc = '<div class="acc"><span class="qmark">?</span></div>';
    }
    body += '</div>'+acc;
    return body;
  }

  // ---- 4-segment context meter ----
  function meterHTML(pct){
    var SEGS = 4;
    var filled = Math.round((Math.max(0,Math.min(100,pct))/100)*SEGS);
    var html = '<div class="bar">';
    for(var i=0;i<SEGS;i++){
      html += '<span class="seg-b'+(i<filled?' on':'')+'"></span>';
    }
    html += '</div>';
    return html;
  }

  // ---- one card ----
  function cardHTML(s){
    var mood = MOODS.indexOf(s.mood)>=0 ? s.mood : "online";
    var emoji = ic(mood);
    var label = labelFor(mood, s.subagentCount);
    var pct = (typeof s.contextPct==="number") ? s.contextPct : 0;
    var tok = (typeof s.contextTokens==="number") ? s.contextTokens : 0;
    var tokK = fmtNum(tok);
    var tokFull = String(tok).replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    var win = (typeof s.contextWindow==="number") ? s.contextWindow : 1000000;
    var winK = fmtNum(win);
    var src = s.ctxSource === "real" ? "real" : "est";

    var title = s.title || T().untitled;
    var project = s.project || "unknown";
    var branch = s.gitBranch ? s.gitBranch : "—";
    var last = fmtRel(s.lastActiveAgeMs);
    var reason = reasonText(s.moodReason);
    var active = !!s.isActiveNow;

    var meta =
      '<div class="meta">'+
        '<span class="seg"><span class="gl">'+ic('branch')+'</span><span class="v">'+esc(branch)+'</span></span>'+
        '<span class="dot-sep">·</span>'+
        '<span class="seg"><span class="gl">'+ic('clock')+'</span><span class="v">'+esc(last)+'</span></span>'+
        (s.model ? '<span class="model">'+modelInner(s.model)+'</span>' : '')+
      '</div>'+
      '<div class="ctxrow" title="'+esc(ctxTitle(src,winK))+'">'+
        '<span class="ctxlbl">CTX<i class="srcdot '+src+'"></i></span>'+
        meterHTML(pct)+
        '<span class="ctxnum">'+pct+'%</span>'+
        '<span class="ctxtok" title="'+esc(tokFull)+' tokens">'+esc(tokK)+' / '+esc(winK)+'</span>'+
      '</div>';

    return ''+
      '<article class="card m-'+mood+(active?' activenow':'')+'" data-mood="'+mood+'" data-id="'+esc(s.id)+'">'+
        (active ? '<span class="activedot" title="'+esc(T().activeNowTitle)+'">'+esc(T().activeNow)+'</span>' : '')+
        '<div class="ctop">'+
          '<div class="stage">'+creatureHTML(mood, s.subagentCount)+'</div>'+
          '<div class="moodbox">'+
            '<span class="minilabel">MOOD</span>'+
            '<span class="moodlabel"><span class="em">'+emoji+'</span>'+esc(label)+'</span>'+
            '<div class="moodtick"></div>'+
          '</div>'+
        '</div>'+
        '<div class="titlerow">'+
          '<div class="ctitle" title="'+esc(title)+'">'+esc(title)+'</div>'+
          '<div class="repo" title="'+esc(s.cwd||project)+'">'+esc(project)+'</div>'+
        '</div>'+
        '<div class="reason">'+esc(reason)+'</div>'+
        '<div class="metarule"></div>'+
        meta+
      '</article>';
  }

  // ---- mood tally chips ----
  function tallyHTML(byMood){
    byMood = byMood || {};
    var labels = T().labels;
    return MOODS.map(function(m){
      var n = byMood[m] || 0;
      return '<span class="chip'+(n===0?' zero':'')+'" data-m="'+m+'" title="'+esc(T().moodTitle(labels[m], n))+'">'+
        '<span class="em">'+ic(m)+'</span>'+
        '<span class="cl">'+esc(labels[m])+'</span>'+
        '<span class="cn">'+n+'</span>'+
      '</span>';
    }).join("");
  }

  // ---- empty state ----
  function emptyHTML(){
    return '<div class="empty">'+
      '<div class="stage m-doze">'+creatureHTML("doze")+'</div>'+
      '<h2>'+esc(T().emptyH2)+'</h2>'+
      '<p>'+T().emptyP(ic('doze'))+'</p>'+
    '</div>';
  }

  // ---- header copy ----
  function renderHeader(st){
    var counts = st.counts || {};
    var total = counts.total || 0;
    var activeNow = counts.activeNow || 0;
    var byMood = counts.byMood || {};

    document.getElementById("bigcount").textContent = String(total);

    var suf = document.getElementById("countsuffix");
    suf.innerHTML = (total === 0) ? T().suffix0 : T().suffixN;

    // recolor live dot toward the most attention-worthy active state
    var dot = document.getElementById("livedot");
    var HUE_PRIO = ["waiting","hot","stuck","fleet","full","excited","fresh","online","doze"];
    var hue = "online";
    for(var hi=0; hi<HUE_PRIO.length; hi++){ if((byMood[HUE_PRIO[hi]]||0)>0){ hue=HUE_PRIO[hi]; break; } }
    var accentVar = "var(--"+hue+")", glowVar = "var(--"+hue+"-glow)";
    dot.style.background = accentVar;
    dot.style.boxShadow = "0 0 14px "+glowVar+", 0 0 0 5px rgba(255,255,255,.05)";

    // witty, attention-aware subtitle —— 最该被先看到的状态优先（waiting 最高）
    var sub = document.getElementById("subtitle");
    sub.style.setProperty("--accent-now", accentVar);
    function P(n){ return '<span class="punch">'+n+'</span>'; }
    var q = T().quip, quip;
    if(total === 0){
      quip = q.none();
    } else if((byMood.waiting||0) > 0){
      quip = q.waiting(P(byMood.waiting));
    } else if((byMood.hot||0) > 0){
      quip = q.hot(P(byMood.hot));
    } else if((byMood.stuck||0) > 0){
      quip = q.stuck(P(byMood.stuck));
    } else if((byMood.fleet||0) > 0){
      quip = q.fleet(P(byMood.fleet));
    } else if((byMood.full||0) > 0){
      quip = q.full(P(byMood.full));
    } else if((byMood.excited||0) > 0){
      quip = q.excited(P(byMood.excited));
    } else if((byMood.fresh||0) > 0){
      quip = q.fresh(P(byMood.fresh));
    } else if(activeNow >= 4){
      quip = q.manyActive(P(activeNow), activeNow);
    } else if(activeNow > 0){
      quip = q.someActive(P(activeNow));
    } else {
      quip = q.idle();
    }
    sub.innerHTML = quip + ' · <span class="z">'+esc(T().subtitleTail)+'</span>';

    var tly = document.getElementById("tally");
    tly.innerHTML = '<span class="tally-cap" id="tallycap">'+esc(T().tallyCap)+'</span>' + tallyHTML(byMood);
  }

  // ---- in-place reconciling render ----
  // Reuse existing card DOM nodes across polls. We only touch the bits of text /
  // the meter that actually changed, so the little-Claude CSS animations NEVER
  // restart -> no flicker. The whole grid is rebuilt only on a real structural
  // change (a session appears / disappears, or we switch to/from the empty view).
  var hasRendered = false;
  var cardsById = Object.create(null); // id -> { el, d:{...cached field values} }
  var gridEl = null;
  var isEmptyView = false;
  var lastState = null; // 最近一次 /api/state，语言切换时用它就地重渲染

  function elFromHTML(html){
    var t = document.createElement("template");
    t.innerHTML = html.trim();
    return t.content.firstElementChild;
  }

  // Snapshot the values cardHTML() rendered, so the first updateCard() is a no-op.
  function fieldsOf(s){
    var mood = MOODS.indexOf(s.mood)>=0 ? s.mood : "online";
    var tok = (typeof s.contextTokens==="number") ? s.contextTokens : 0;
    var tokK = fmtNum(tok);
    var win = (typeof s.contextWindow==="number") ? s.contextWindow : 1000000;
    var winK = fmtNum(win);
    return {
      mood: mood,
      emoji: ic(mood),
      label: labelFor(mood, s.subagentCount),
      active: !!s.isActiveNow,
      title: s.title || T().untitled,
      project: s.project || "unknown",
      cwd: s.cwd || (s.project || "unknown"),
      reason: reasonText(s.moodReason),
      branch: s.gitBranch ? s.gitBranch : "—",
      last: fmtRel(s.lastActiveAgeMs),
      model: s.model || null,
      pct: (typeof s.contextPct==="number") ? s.contextPct : 0,
      src: s.ctxSource === "real" ? "real" : "est",
      winK: winK,
      toktxt: tokK + " / " + winK,
      tokfull: String(tok).replace(/\B(?=(\d{3})+(?!\d))/g, ",")
    };
  }

  function updateCard(rec, s){
    var el = rec.el, d = rec.d, n = fieldsOf(s);

    if(n.mood !== d.mood){ // rare: the only time a card's animation legitimately resets
      el.classList.remove("m-"+d.mood); el.classList.add("m-"+n.mood);
      el.setAttribute("data-mood", n.mood);
      var stage = el.querySelector(".stage"); if(stage) stage.innerHTML = creatureHTML(n.mood, s.subagentCount);
      var ml = el.querySelector(".moodlabel"); if(ml) ml.innerHTML = '<span class="em">'+n.emoji+'</span>'+esc(n.label);
    } else if(n.emoji !== d.emoji || n.label !== d.label){
      var ml2 = el.querySelector(".moodlabel"); if(ml2) ml2.innerHTML = '<span class="em">'+n.emoji+'</span>'+esc(n.label);
    }

    if(n.active !== d.active){
      el.classList.toggle("activenow", n.active);
      var dot = el.querySelector(".activedot");
      if(n.active && !dot){
        var p = document.createElement("span"); p.className = "activedot"; p.title = T().activeNowTitle; p.textContent = T().activeNow;
        el.insertBefore(p, el.firstChild);
      } else if(!n.active && dot){ dot.parentNode.removeChild(dot); }
    }

    if(n.title !== d.title){ var ct = el.querySelector(".ctitle"); if(ct){ ct.textContent = n.title; ct.title = n.title; } }
    if(n.project !== d.project || n.cwd !== d.cwd){ var rp = el.querySelector(".repo"); if(rp){ rp.textContent = n.project; rp.title = n.cwd; } }
    if(n.reason !== d.reason){ var rs = el.querySelector(".reason"); if(rs) rs.textContent = n.reason; }

    if(n.branch !== d.branch || n.last !== d.last){
      var vs = el.querySelectorAll(".meta .seg .v");
      if(vs[0] && n.branch !== d.branch) vs[0].textContent = n.branch;
      if(vs[1] && n.last !== d.last) vs[1].textContent = n.last;
    }

    if(n.model !== d.model){
      var mb = el.querySelector(".meta .model"), meta = el.querySelector(".meta");
      if(n.model){ if(mb) mb.innerHTML = modelInner(n.model); else if(meta){ var nb = document.createElement("span"); nb.className="model"; nb.innerHTML = modelInner(n.model); meta.appendChild(nb); } }
      else if(mb){ mb.parentNode.removeChild(mb); }
    }

    if(n.pct !== d.pct){
      var filled = Math.round((Math.max(0,Math.min(100,n.pct))/100)*4);
      var segs = el.querySelectorAll(".bar .seg-b");
      for(var i=0;i<segs.length;i++) segs[i].classList.toggle("on", i<filled);
      var num = el.querySelector(".ctxnum"); if(num) num.textContent = n.pct + "%";
    }
    if(n.toktxt !== d.toktxt){
      var tk = el.querySelector(".ctxtok");
      if(tk){ tk.textContent = n.toktxt; tk.title = n.tokfull + " tokens"; }
    }
    if(n.src !== d.src || n.winK !== d.winK){
      var dot = el.querySelector(".srcdot"); if(dot) dot.className = "srcdot " + n.src;
      var row = el.querySelector(".ctxrow"); if(row) row.title = ctxTitle(n.src, n.winK);
    }

    rec.d = n;
  }

  function renderMain(st){
    var sessions = Array.isArray(st.sessions) ? st.sessions : [];
    var main = document.getElementById("main");

    if(sessions.length === 0){
      if(!isEmptyView){ main.innerHTML = emptyHTML(); cardsById = Object.create(null); gridEl = null; isEmptyView = true; }
      return;
    }

    if(isEmptyView || !gridEl || !gridEl.isConnected){
      main.innerHTML = '<div class="grid"></div>';
      gridEl = main.querySelector(".grid");
      cardsById = Object.create(null);
      isEmptyView = false;
    }

    var seen = Object.create(null);
    sessions.forEach(function(s){
      seen[s.id] = true;
      var rec = cardsById[s.id];
      if(!rec){
        var el = elFromHTML(cardHTML(s));
        rec = cardsById[s.id] = { el: el, d: fieldsOf(s) };
        gridEl.appendChild(el); // new sessions append; existing cards never move (zero flicker)
      } else {
        updateCard(rec, s);
      }
    });

    Object.keys(cardsById).forEach(function(id){
      if(!seen[id]){
        var rec = cardsById[id];
        if(rec.el && rec.el.parentNode) rec.el.parentNode.removeChild(rec.el);
        delete cardsById[id];
      }
    });
  }

  function render(st){
    lastState = st;
    try{ renderHeader(st); }catch(e){}
    try{ renderMain(st); }catch(e){}
    hasRendered = true;
  }

  // ---- polling ----
  var POLL_MS = 2000;
  var timer = null;
  var inFlight = false;

  function poll(){
    if(document.hidden || inFlight) return;
    inFlight = true;
    fetch("/api/state", {cache:"no-store"})
      .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
      .then(function(st){ render(st); })
      .catch(function(err){
        // keep last good view; show a soft note only if nothing rendered yet
        if(!hasRendered){
          document.getElementById("main").innerHTML =
            '<div class="loading" id="loading">'+T().loadErr(esc(err.message))+'</div>';
        }
      })
      .then(function(){ inFlight = false; });
  }

  function loop(){
    poll();
    timer = setTimeout(loop, POLL_MS);
  }

  document.addEventListener("visibilitychange", function(){
    if(!document.hidden){ poll(); } // refresh immediately when tab returns
  });

  // ---- static (non-poll) text: title / badge / footer / loading / placeholders ----
  // 这些不随轮询变，但要随语言切换。renderHeader 之后会覆盖 subtitle/tally/countsuffix，
  // 故这里设的是首屏占位 + 那些 render 不碰的元素（标题、徽章、页脚）。
  function setText(id, txt){ var e = document.getElementById(id); if(e) e.textContent = txt; }
  function applyStaticText(){
    var t = T();
    document.title = t.docTitle;
    document.documentElement.lang = (LANG==="zh" ? "zh-CN" : "en");
    setText("badge", t.badge);
    setText("subtitle", t.subtitleInit);
    setText("tallycap", t.tallyCap);
    var tl = document.getElementById("tally"); if(tl) tl.setAttribute("aria-label", t.tallyAria);
    var ld = document.getElementById("loading"); if(ld) ld.textContent = t.loading;
    var cs = document.getElementById("countsuffix"); if(cs) cs.innerHTML = t.suffixN;
    var fp = document.getElementById("footpills");
    if(fp) fp.innerHTML = t.pills.map(function(p){ return '<span class="pill">'+esc(p)+'</span>'; }).join("");
    var fc = document.getElementById("footcopy"); if(fc) fc.innerHTML = t.footer;
  }
  function updateToggleUI(){
    var btns = document.querySelectorAll("#langtoggle button");
    for(var i=0;i<btns.length;i++){ btns[i].classList.toggle("on", btns[i].getAttribute("data-lang")===LANG); }
  }
  function setLang(l){
    if(l!=="zh" && l!=="en") return;
    if(l!==LANG){ LANG = l; try{ localStorage.setItem("crew-lang", l); }catch(e){} }
    updateToggleUI();
    applyStaticText();
    // 切换是低频操作：强制整网格重建，让每张卡片用新语言重渲染（不必在意这点开销）。
    isEmptyView = false; gridEl = null; cardsById = Object.create(null);
    if(lastState) render(lastState);
  }
  var toggleEl = document.getElementById("langtoggle");
  if(toggleEl){
    toggleEl.addEventListener("click", function(e){
      var b = e.target.closest ? e.target.closest("button[data-lang]") : null;
      if(b) setLang(b.getAttribute("data-lang"));
    });
  }

  // kick off
  updateToggleUI();
  applyStaticText();
  poll();
  loop();
})();
</script>
</body>
</html>
